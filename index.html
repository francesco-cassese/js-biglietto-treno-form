<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- FAVICON -->
    <link rel="shortcut icon" href="./img/favicon-treno.png" type="image/x-icon">
    <title>Sfreccia Rossa Ma Non Troppo</title>

    <!-- COLLEGAMENTO BOOTSTRAP-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- COLLEGAMENTO GOOGLE FONTS "Montserrat" -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <!-- COLLEGAMENTO GOOGLE FONTS "Roboto"-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <!-- COLLEGAMENTI CSS -->
    <link rel="stylesheet" href="./styles/mediaquery.css">
    <link rel="stylesheet" href="./styles/style.css">
</head>

<body>
    <header class="header-container d-flex">
        <h1 class="title-header bold p-4">SFRECCIA ROSSA MA NON TROPPO</h1>
    </header>
    <main class="wrapper">
        <!-- FORM -->
        <form id="ticket-form">
            <div class="container">
                <div class="row">
                    <div class="col-lg-12 flex-wrap pt-3">

                        <!-- NOME -->
                        <label>
                            <span class="fw-bold txt-grey-label ">Nome:</span>
                            <input class="form-control input-name" required type="text" placeholder="Es. Mario Rossi"
                                aria-label="Inserisci qui il tuo nome ">
                        </label>

                        <!-- CHILOMETRI -->
                        <label>
                            <span class="fw-bold txt-grey-label">Chilometri da percorrere:</span>
                            <input class="form-control input-km" required type="number" placeholder="Inserisci i km"
                                aria-label="Inserisci qui i chilometri da percorrere">
                        </label>

                        <!-- FASCIA D'ETà-->
                        <label>
                            <span class="fw-bold txt-grey-label">Fascia d'età</span>
                            <select class="form-select select-age mb-3" required id="age-selector"
                                aria-label="Seleziona la tua fascia d'età">
                                <option selected disabled hidden value="">Seleziona fascia d'età</option>
                                <option value="18">Ho meno di 17 anni</option>
                                <option value="30">Età compresa tra 18 e 64</option>
                                <option value="65">Ho più di 65 anni</option>
                            </select>
                        </label>

                        <!-- BOTTONE -->
                        <button type="submit" class="btn-ticket">Paga e piangi</button>
                    </div>
                </div>
            </div>
        </form>

        <!-- CARD -->
        <div class="card border-0 shadow-sm mt-5 card">
            <div class="card p-4">
                <h5 class="fw-bold text-uppercase mb-3">
                    Dettaglio passeggeri
                </h5>

                <div class="row g-0 border-top border-bottom" style="min-height: 100px;">

                    <div class="col-md-3 p-3">
                        <small class="d-block text-uppercase fw-bold mb-1" style="font-size: 0.75rem;">
                            Nome Passeggero
                        </small>
                        <span class="fw-bold">Jon Snow</span>
                    </div>

                    <div class="col-md-9 p-3 bg-white">
                        <div class="row text-start text-md-center h-100 align-items-center">

                            <div class="col-6 col-md-3">
                                <small class="d-block fw-bold text-muted mb-1">Offerta</small>
                                <span style="font-size: 0.9rem;">Biglietto Standard</span>
                            </div>

                            <div class="col-6 col-md-3">
                                <small class="d-block fw-bold text-muted mb-1">Carrozza</small>
                                <span style="font-size: 0.9rem;">5</span>
                            </div>

                            <div class="col-6 col-md-3">
                                <small class="d-block fw-bold text-muted mb-1">Codice CP</small>
                                <span style="font-size: 0.9rem;">92911</span>
                            </div>

                            <div class="col-6 col-md-3">
                                <small class="d-block fw-bold text-muted mb-1">Costo biglietto</small>
                                <span class="fw-bold" style="font-size: 0.9rem;">2.10&euro;</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./scripts/function.js"></script>
    <script src="./scripts/script.js"></script>
</body>

</html>
