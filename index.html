<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- FAVICON -->
    <link rel="shortcut icon" href="./img/favicon-treno.png" type="image/x-icon">
    <title>Sfreccia Rossa Ma Non Troppo</title>

    <!-- COLLEGAMENTO BOOTSTRAP-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- COLLEGAMENTO GOOGLE FONTS "Montserrat" -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <!-- COLLEGAMENTO GOOGLE FONTS "Roboto"-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <!-- COLLEGAMENTO GOOGLE FONTS "Libre Bar Code 39"-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Barcode+39&display=swap" rel="stylesheet">

    <!-- COLLEGAMENTI CSS -->
    <link rel="stylesheet" href="./styles/style.css">
</head>

<body>
    <header class="header-container d-flex">
        <h1 class="title-header bold p-4">SFRECCIA ROSSA MA NON TROPPO</h1>
    </header>
    <main class="wrapper">
        <!-- FORM -->
        <form id="ticket-form">
            <div class="container">
                <div class="row">
                    <div class="col-lg-12 flex-wrap pt-3">

                        <!-- NOME -->
                        <label>
                            <span class="fw-bold txt-grey-label ">Nome:</span>
                            <input class="form-control input-name" required type="text" placeholder="Es. Mario Rossi"
                                aria-label="Inserisci qui il tuo nome ">
                        </label>

                        <!-- CHILOMETRI -->
                        <label>
                            <span class="fw-bold txt-grey-label">Chilometri da percorrere:</span>
                            <input class="form-control input-km" required type="number" placeholder="Inserisci i km"
                                aria-label="Inserisci qui i chilometri da percorrere">
                        </label>

                        <!-- FASCIA D'ETà-->
                        <label>
                            <span class="fw-bold txt-grey-label">Fascia d'età</span>
                            <select class="form-select select-age mb-3" required id="age-selector"
                                aria-label="Seleziona la tua fascia d'età">
                                <option selected disabled hidden value="">Seleziona età</option>
                                <option value="17">Meno di 17</option>
                                <option value="30">Maggiorenne</option>
                                <option value="65">Senior (più di 65 anni)</option>
                            </select>
                        </label>

                        <!-- BOTTONE -->
                        <button type="submit" class="btn-ticket">Paga e piangi</button>
                    </div>
                </div>
            </div>
        </form>

        <!-- CARD -->
        <div class="container">
            <div id="container-ticket" class="row d-none">
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./scripts/function.js"></script>
    <script src="./scripts/script.js"></script>
</body>

</html>
