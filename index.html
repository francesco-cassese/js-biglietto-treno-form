<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- FAVICON -->
    <link rel="shortcut icon" href="./img/favicon-treno.png" type="image/x-icon">
    <title>Sfreccia Rossa Ma Non Troppo</title>

    <!-- COLLEGAMENTO BOOTSTRAP-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<header>

</header>
<main>

    <!-- FORM -->
    <form>

        <!-- NOME -->
        <label>
            <span class="fw-bold">Nome:</span>
            <input class="form-control input-name" type="text" placeholder="Es. Mario Rossi"
                aria-label="Inserisci qui il tuo nome ">
        </label>

        <!-- CHILOMETRI -->
        <label>
            <span class="fw-bold">Chilometri da percorrere:</span>
            <input class="form-control input-km" type="text" placeholder="Inserisci i km"
                aria-label="Inserisci qui i chilometri da percorrere">
        </label>

        <!-- FASCIA D'ETà-->
        <label for="form-Select">
            <span class="fw-bold">Fascia d'età</span>
            <select class="form-select select-age" id="ageSelector" aria-label="Seleziona la tua fascia d'età">
                <option selected>Seleziona fascia d'età</option>
                <option value="reduce hild">Ho meno di 17 anni</option>
                <option value="standard">Età compresa tra 18 e 64</option>
                <option value="reduced Senior">Ho più di 65 anni</option>
            </select>
        </label>

        <!-- BOTTONE -->
        <button type="submit">Paga e piangi</button>
    </form>
</main>

<body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
