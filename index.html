<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- FAVICON -->
    <link rel="shortcut icon" href="./img/favicon-treno.png" type="image/x-icon">
    <title>Sfreccia Rossa Ma Non Troppo</title>

    <!-- COLLEGAMENTO BOOTSTRAP-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- COLLEGAMENTO CSS -->
    <link rel="stylesheet" href="./styles/style.css">
</head>

<body>
    <header>
        <h1 class="title-header">SFRECCIA ROSSA MA NON TROPPO</h1>
    </header>
    <main>

        <!-- FORM -->
        <form id="ticket-form">
            <div class="container">
                <div class="row">
                    <div class="col-lg-8 mx-auto">

                        <!-- NOME -->
                        <label>
                            <span class="fw-bold">Nome:</span>
                            <input class="form-control input-name" required type="text" placeholder="Es. Mario Rossi"
                                aria-label="Inserisci qui il tuo nome ">
                        </label>

                        <!-- CHILOMETRI -->
                        <label>
                            <span class="fw-bold">Chilometri da percorrere:</span>
                            <input class="form-control input-km" required type="number" placeholder="Inserisci i km"
                                aria-label="Inserisci qui i chilometri da percorrere">
                        </label>

                        <!-- FASCIA D'ETà-->
                        <label>
                            <span class="fw-bold">Fascia d'età</span>
                            <select class="form-select select-age" required id="age-selector"
                                aria-label="Seleziona la tua fascia d'età">
                                <option selected disabled hidden value="">Seleziona fascia d'età</option>
                                <option value="18">Ho meno di 17 anni</option>
                                <option value="30">Età compresa tra 18 e 64</option>
                                <option value="65">Ho più di 65 anni</option>
                            </select>
                        </label>

                        <!-- BOTTONE -->
                        <button type="submit" id="btn-ticket">Paga e piangi</button>
                    </div>
                </div>
            </div>
        </form>

        <!-- CARD -->
        <section class="container">
            <div class="row">
                <div class="col-lg-8 mx-auto">
                    <div class="card">
                        <div class="container-img"></div>
                        <h3 class="passenger-name">Francesco</h3>
                        <table class="table">
                            <thead>
                                <tr>
                                    <th scope="col">Offerta</th>
                                    <th scope="col">Carrozza</th>
                                    <th scope="col">CodiceCP</th>
                                    <th scope="col">Costo Biglietto</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>Biglietto Standard</td>
                                    <td>5</td>
                                    <td>92911</td>
                                    <td>&euro;2.10</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </main>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./scripts/function.js"></script>
    <script src="./scripts/script.js"></script>
</body>

</html>
